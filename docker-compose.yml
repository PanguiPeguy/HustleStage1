version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: facturation-db
    environment:
      POSTGRES_DB: facturation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./Backend
    container_name: facturation-api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/facturation
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgrespassword
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
    container_name: facturation-web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
